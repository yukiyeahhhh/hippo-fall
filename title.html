<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>どうぶつポトン — タイトル</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg1:#fef3e2;--bg2:#fde4cf;--board:#e9c9a8;--cell:#f6e4cd;
    --ink:#6b4a32;--ink-soft:#9c7a5c;--accent:#e8915b;--accent-d:#d2763f;
    --fire:#ef6f4d;--danger:#e0364a;--gold:#ffc400;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:'M PLUS Rounded 1c','Hiragino Maru Gothic ProN','Yu Gothic',system-ui,sans-serif;
    background:radial-gradient(120% 120% at 50% 0%,var(--bg1) 0%,var(--bg2) 100%);
    color:var(--ink);height:100dvh;overflow:hidden;user-select:none;
    display:flex;align-items:center;justify-content:center;position:relative;
  }

  /* 背景：ゆっくり落ちてくる動物たち */
  .bg-fall{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0;}
  .bg-fall span{
    position:absolute;top:-60px;font-size:34px;opacity:.22;
    animation:fall linear infinite;
  }
  @keyframes fall{
    0%{transform:translateY(-60px) rotate(0deg);}
    100%{transform:translateY(105dvh) rotate(360deg);}
  }

  /* メインカード */
  .title-wrap{
    position:relative;z-index:1;width:100%;max-width:420px;padding:0 22px;
    display:flex;flex-direction:column;align-items:center;text-align:center;
    animation:cardIn .7s cubic-bezier(.2,.9,.3,1.2) both;
  }
  @keyframes cardIn{from{opacity:0;transform:translateY(18px) scale(.96);}to{opacity:1;transform:none;}}

  /* ロゴ */
  .logo-badge{
    font-size:13px;font-weight:800;letter-spacing:2px;color:var(--accent-d);
    background:rgba(255,255,255,.6);padding:5px 16px;border-radius:999px;
    margin-bottom:14px;box-shadow:0 3px 0 rgba(210,118,63,.18);
  }
  h1{
    font-size:clamp(44px,13vw,62px);font-weight:800;line-height:.95;
    color:var(--ink);letter-spacing:1px;
    text-shadow:0 4px 0 #fff,0 5px 0 rgba(210,118,63,.25),0 12px 22px rgba(180,110,50,.25);
    margin-bottom:6px;
  }
  h1 .pop{display:inline-block;animation:bob 2.4s ease-in-out infinite;}
  h1 .pop:nth-child(2){animation-delay:.3s;}
  @keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}
  .tagline{font-size:14px;font-weight:700;color:var(--ink-soft);margin-bottom:22px;}

  /* 進化チェーン演出 */
  .chain{
    display:flex;align-items:center;justify-content:center;gap:4px;
    background:rgba(255,255,255,.55);border-radius:18px;padding:12px 14px;
    margin-bottom:26px;box-shadow:0 6px 0 rgba(210,118,63,.12);
  }
  .chain .animal{font-size:30px;display:inline-block;animation:hop 2s ease-in-out infinite;}
  .chain .animal:nth-child(1){animation-delay:0s;}
  .chain .animal:nth-child(3){animation-delay:.15s;}
  .chain .animal:nth-child(5){animation-delay:.3s;}
  .chain .animal:nth-child(7){animation-delay:.45s;}
  .chain .animal:nth-child(9){animation-delay:.6s;font-size:36px;}
  @keyframes hop{0%,100%{transform:translateY(0) scale(1);}40%{transform:translateY(-8px) scale(1.08);}}
  .chain .arr{color:var(--accent);font-size:14px;font-weight:800;}

  /* ボタン群 */
  .btns{display:flex;flex-direction:column;gap:12px;width:100%;max-width:300px;}
  .btn{
    font-family:inherit;font-weight:800;border:none;cursor:pointer;
    border-radius:18px;padding:17px;font-size:19px;transition:transform .1s,box-shadow .15s;
  }
  .btn-main{
    color:#fff;background:linear-gradient(180deg,#f0a06a,var(--accent-d));
    box-shadow:0 6px 0 #b25d2c,0 10px 18px rgba(180,90,40,.35);
  }
  .btn-main:active{transform:translateY(4px);box-shadow:0 2px 0 #b25d2c,0 4px 10px rgba(180,90,40,.3);}
  .btn-sub{
    color:var(--accent-d);background:rgba(255,255,255,.7);font-size:16px;padding:13px;
    box-shadow:0 4px 0 rgba(210,118,63,.18);
  }
  .btn-sub:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(210,118,63,.18);}

  .footer{position:fixed;bottom:10px;left:0;right:0;text-align:center;font-size:10px;color:var(--ink-soft);opacity:.6;z-index:1;}
</style>
</head>
<body>
  <!-- 背景に落ちてくる動物 -->
  <div class="bg-fall" id="bgFall"></div>

  <div class="title-wrap">
    <div class="logo-badge">🎲 ROGUELITE MODE</div>
    <h1><span class="pop">どうぶつ</span><span class="pop">ポトン</span></h1>
    <div class="tagline">つなげて育てて、コビトカバを呼ぼう！</div>

    <div class="chain">
      <span class="animal">🐹</span><span class="arr">▶</span>
      <span class="animal">🐿️</span><span class="arr">▶</span>
      <span class="animal">🦆</span><span class="arr">▶</span>
      <span class="animal">🦦</span><span class="arr">▶</span>
      <span class="animal">🦛</span>
    </div>

    <div class="btns">
      <button class="btn btn-main" onclick="onStart()">▶ はじめる</button>
      <button class="btn btn-sub" onclick="onHelp()">📖 あそびかた</button>
    </div>

  </div>

  <div class="footer">© どうぶつポトン</div>

<script>
  // 背景に落ちてくる動物をランダム生成
  const animals=['🐹','🐿️','🦆','🦦','🦛','🧱'];
  const bg=document.getElementById('bgFall');
  for(let i=0;i<14;i++){
    const s=document.createElement('span');
    s.textContent=animals[Math.floor(Math.random()*animals.length)];
    s.style.left=Math.random()*100+'%';
    s.style.animationDuration=(7+Math.random()*8)+'s';
    s.style.animationDelay=(-Math.random()*12)+'s';
    s.style.fontSize=(24+Math.random()*22)+'px';
    bg.appendChild(s);
  }

  function onStart(){ location.href='index.html'; }
  function onHelp(){ location.href='index.html?help=1'; }
</script>
</body>
</html>
